<!DOCTYPE html>
<html>
<head>

<title>V2 Booking</title>

<style>

body{
 background:#0b0b0b;
 color:#d4af37;
 font-family:Arial;
}

.container{
 max-width:900px;
 margin:auto;
}

.slot{
 border:1px solid gold;
 padding:10px;
 margin:6px;
 display:flex;
 justify-content:space-between;
}

button{
 background:gold;
 border:none;
 padding:5px 10px;
 cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Rezerwacja EXP v2</h1>

<div id="slots"></div>

</div>

<script>

async function loadSlots(){

const res = await fetch("https://v2-booking-backend.onrender.com/api/reservations/slots")

const slots = await res.json()

const container = document.getElementById("slots")

slots.slice(0,50).forEach(slot=>{

const div = document.createElement("div")

div.className="slot"

div.innerHTML = `
<span>${slot.date} | ${slot.hour}:00</span>
<button onclick="reserve(${slot.id})">Rezerwuj</button>
`

container.appendChild(div)

})

}

loadSlots()
 async function reserve(id){

const type = prompt("Wpisz typ: solo / duo / trio")

const res = await fetch("https://v2-booking-backend.onrender.com/api/reservations/reserve",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
slotId:id,
type:type
})

})

const data = await res.json()

alert("Rezerwacja wykonana. PIN: "+data.pin)

}

</script>

</body>
</html>
