<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">

<title>V2 EXP – Spider Dungeon</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
font-family:Georgia;
background:url("https://en-wiki.metin2.gameforge.com/images/SpiderDungeon2.jpg") center/cover fixed;
color:#f2e6c4;
}

.overlay{
background:rgba(0,0,0,0.85);
min-height:100vh;
}

header{
text-align:center;
padding:40px;
border-bottom:3px solid #bfa046;
}

#logo{
height:420px;
}

.title{
font-size:40px;
letter-spacing:2px;
color:#e3c87c;
margin-top:10px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
max-width:800px;
margin:40px auto;
gap:8px;
}

.day{
background:#111;
border:1px solid #5a4a2c;
padding:14px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.day:hover{
background:#1b1b1b;
}

.day.active{
border:2px solid #e3c87c;
}

#slots{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.slot{
background:#121212;
border:2px solid #3b2e14;
border-radius:12px;
padding:18px;
transition:0.25s;
}

.slot:hover{
transform:scale(1.04);
box-shadow:0 0 20px rgba(227,200,124,0.4);
}

.free{
border-color:#2c7a2c;
}

.taken{
border-color:#9e2b2b;
}

.blocked{
border-color:#666;
}

.slotTitle{
font-size:18px;
margin-bottom:8px;
color:#e3c87c;
}

.players{
font-size:14px;
margin-bottom:8px;
}

input{
width:100%;
margin-top:5px;
background:#1a1a1a;
border:1px solid #555;
color:white;
padding:6px;
}

button{
margin-top:6px;
width:100%;
background:#3b2a0f;
border:1px solid #e3c87c;
color:#e3c87c;
padding:6px;
cursor:pointer;
}

button:hover{
background:#5a3f14;
}

#chat{
position:fixed;
left:20px;
bottom:20px;
width:260px;
background:#111;
border:2px solid #e3c87c;
padding:10px;
}

#chatMessages{
height:150px;
overflow:auto;
font-size:13px;
margin-bottom:6px;
}

#ranking{
position:fixed;
right:20px;
top:160px;
background:#111;
border:2px solid #e3c87c;
padding:10px;
width:200px;
}

</style>

</head>

<body>

<div class="overlay">

<header>

<img id="logo" src="https://prnt.sc/BRxl1uLayID1">

<div class="title">Spider Dungeon V2 EXP</div>

</header>

<div id="calendar" class="calendar"></div>

<div id="slots"></div>

<div id="chat">

<div id="chatMessages"></div>

<input id="chatInput" placeholder="Napisz wiadomość">

<button onclick="sendChat()">Wyślij</button>

</div>

<div id="ranking">

<b>Najwięcej expili</b>

<div id="rankingList"></div>

</div>

</div>

<script>

const socket=io()

let bookings={}
let ranking={}
let chat=[]
let selectedDay=null

socket.on("init",(data)=>{

bookings=data.bookings
ranking=data.ranking
chat=data.chat

renderChat()
renderRanking()

})

socket.on("update",(data)=>{

bookings=data.bookings
ranking=data.ranking

renderSlots()
renderRanking()

})

socket.on("chat",(data)=>{

chat=data
renderChat()

})

function renderChat(){

let box=document.getElementById("chatMessages")
box.innerHTML=""

chat.forEach(m=>{
box.innerHTML+="<div>"+m+"</div>"
})

}

function sendChat(){

let msg=document.getElementById("chatInput").value

socket.emit("chat",msg)

document.getElementById("chatInput").value=""

}

function renderRanking(){

let box=document.getElementById("rankingList")

box.innerHTML=""

Object.entries(ranking)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)
.forEach(r=>{
box.innerHTML+="<div>"+r[0]+" ("+r[1]+")</div>"
})

}

function buildCalendar(){

let cal=document.getElementById("calendar")

let date=new Date()
let year=date.getFullYear()
let month=date.getMonth()

let days=new Date(year,month+1,0).getDate()

for(let i=1;i<=days;i++){

let d=document.createElement("div")
d.className="day"
d.innerText=i

let iso=year+"-"+String(month+1).padStart(2,"0")+"-"+String(i).padStart(2,"0")

d.onclick=()=>{

selectedDay=iso

document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"))

d.classList.add("active")

renderSlots()

}

cal.appendChild(d)

}

}

function renderSlots(){

if(!selectedDay) return

let container=document.getElementById("slots")

container.innerHTML=""

let dayData=bookings[selectedDay]||{}

for(let h=0;h<24;h++){

let start=String(h).padStart(2,"0")+":00"
let end=String((h+1)%24).padStart(2,"0")+":00"

let div=document.createElement("div")
div.className="slot"

let slot=dayData[start]

if(!slot){

div.classList.add("free")

div.innerHTML=`
<div class="slotTitle">${start}-${end}</div>

<input id="p_${start}" placeholder="Nick">

<input id="pin_${start}" placeholder="PIN">

<button onclick="book('${start}',1)">Solo</button>

<button onclick="book('${start}',2)">Party 2</button>

<button onclick="book('${start}',3)">Party 3</button>
`

}else if(slot.blocked){

div.classList.add("blocked")

div.innerHTML=`<div class="slotTitle">${start}-${end}</div>Brak expa`

}else{

div.classList.add("taken")

let players=""

slot.players.forEach(p=>{
players+="<div>"+p.player+"</div>"
})

div.innerHTML=`
<div class="slotTitle">${start}-${end}</div>

<div class="players">${players}</div>

<input id="pin_cancel_${start}" placeholder="PIN anulowania">

<button onclick="cancel('${start}')">Anuluj</button>
`

}

container.appendChild(div)

}

}

function book(time,type){

let player=document.getElementById("p_"+time).value
let pin=document.getElementById("pin_"+time).value

socket.emit("book",{day:selectedDay,time,player,pin,type})

}

function cancel(time){

let pin=document.getElementById("pin_cancel_"+time).value

socket.emit("cancel",{day:selectedDay,time,pin})

}

buildCalendar()

</script>

</body>
</html>
