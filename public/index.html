<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">

<title>V2 EXP Booking</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

h1{
margin-top:20px;
}

.pricing{
background:#1a1a1a;
border:2px solid #6a5125;
border-radius:10px;
padding:15px;
max-width:700px;
margin:auto;
margin-bottom:20px;
}

.calendar{
margin:20px;
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.slot{
background:#1a1a1a;
border-radius:10px;
border:2px solid #6a5125;
padding:10px;
}

.free{border-color:#3fa34d}
.taken{border-color:#a33}
.blocked{border-color:#555;background:#333}

button{
background:#3b2a0f;
border:1px solid #caa64a;
color:#ffd36a;
padding:4px 8px;
margin-top:5px;
cursor:pointer;
}

input,select{
width:90%;
margin-top:5px;
}

.player{
font-size:14px;
}

</style>

</head>

<body>

<h1>EXP V2 BOOKING</h1>

<div class="pricing">

<h3>Cennik</h3>

Solo EXP  
<br>
5k SM / godzina

<br><br>

Party 2 osoby  
<br>
2k SM / osoba

<br><br>

Party 3 osoby  
<br>
1.5k SM / osoba

<br><br>

Możliwa płatność w Yang

</div>

<div class="calendar">

<button onclick="prevDay()">◀</button>

<span id="day"></span>

<button onclick="nextDay()">▶</button>

</div>

<div>

<input id="adminPass" placeholder="Admin password">

<button onclick="loginAdmin()">Admin</button>

</div>

<div id="stats"></div>

<div class="container" id="slots"></div>

<script>

const socket = io()

let bookings={}

let day = new Date().toISOString().slice(0,10)

let admin=false

function formatDay(){
document.getElementById("day").innerText=day
}

function prevDay(){
let d=new Date(day)
d.setDate(d.getDate()-1)
day=d.toISOString().slice(0,10)
render()
}

function nextDay(){
let d=new Date(day)
d.setDate(d.getDate()+1)
day=d.toISOString().slice(0,10)
render()
}

function loginAdmin(){

if(document.getElementById("adminPass").value==="platforma"){
admin=true
render()
}

}

function render(){

formatDay()

let container=document.getElementById("slots")

container.innerHTML=""

let dayData=bookings[day]||{}

let sm=0

for(let h=0;h<24;h++){

let start=String(h).padStart(2,"0")+":00"
let end=String((h+1)%24).padStart(2,"0")+":00"

let time=start+" - "+end

let key=start

let div=document.createElement("div")
div.className="slot"

let slot=dayData[key]

if(!slot){

div.classList.add("free")

div.innerHTML=`
<b>${time}</b>

<div>WOLNE</div>

<input id="p_${key}" placeholder="Nick">

<select id="type_${key}">
<option value="1">Solo</option>
<option value="2">Party 2</option>
<option value="3">Party 3</option>
</select>

<input id="pin_${key}" placeholder="PIN">

<button onclick="book('${key}')">Zarezerwuj</button>
`

}else if(slot.blocked){

div.classList.add("blocked")

div.innerHTML=`<b>${time}</b><div>ZABLOKOWANE</div>`

if(admin){
div.innerHTML+=`<button onclick="adminDelete('${key}')">Odblokuj</button>`
}

}else{

div.classList.add("taken")

let html=`<b>${time}</b>`

slot.players.forEach(p=>{
html+=`<div class="player">${p.player}</div>`
})

html+=`
<input id="pin_${key}" placeholder="PIN">

<button onclick="cancel('${key}')">Anuluj</button>
`

if(admin){

html+=`
<button onclick="block('${key}')">Zablokuj</button>
<button onclick="adminDelete('${key}')">Usuń</button>
`

}

div.innerHTML=html

if(slot.type==1) sm+=5000
if(slot.type==2) sm+=2000*slot.players.length
if(slot.type==3) sm+=1500*slot.players.length

}

container.appendChild(div)

}

if(admin){

document.getElementById("stats").innerHTML=

`Zarobione SM: ${sm}`

}

}

function book(time){

let player=document.getElementById("p_"+time).value
let pin=document.getElementById("pin_"+time).value
let type=parseInt(document.getElementById("type_"+time).value)

socket.emit("book",{day,time,player,pin,type})

}

function cancel(time){

let pin=document.getElementById("pin_"+time).value

socket.emit("cancel",{day,time,pin})

}

function block(time){

socket.emit("block",{password:"platforma",day,time})

}

function adminDelete(time){

socket.emit("adminDelete",{password:"platforma",day,time})

}

socket.on("update",(data)=>{

bookings=data

render()

})

render()

</script>

</body>
</html>
