<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>V2 EXP</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:url("https://en-wiki.metin2.gameforge.com/images/SpiderDungeon2.jpg") center/cover fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
}

.header{
display:flex;
justify-content:center;
align-items:center;
padding:15px;
border-bottom:3px solid #caa64a;
background:#0d0d0d;
position:relative;
}

.logo{
height:70px;
}

.adminIcon{
position:absolute;
right:20px;
top:20px;
cursor:pointer;
font-size:26px;
color:#ffd36a;
}

.panel{
max-width:1300px;
margin:auto;
padding:20px;
}

.pricing{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.price{
background:#141414;
border:2px solid #6a5125;
border-radius:10px;
padding:15px;
width:180px;
text-align:center;
transition:0.2s;
}

.price:hover{
transform:scale(1.05);
box-shadow:0 0 10px #caa64a;
}

.calendar{
text-align:center;
margin-bottom:20px;
}

.calendar button{
background:#3b2a0f;
border:1px solid #caa64a;
color:#ffd36a;
padding:6px 12px;
cursor:pointer;
}

.slots{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.slot{
background:#151515;
border-radius:10px;
border:2px solid #333;
padding:10px;
transition:0.2s;
}

.slot:hover{
box-shadow:0 0 12px #caa64a;
}

.free{border-color:#2e9c45}
.taken{border-color:#c05}
.blocked{border-color:#777;background:#333}

.time{
color:#ffd36a;
font-weight:bold;
margin-bottom:6px;
}

.players{
font-size:14px;
margin-bottom:5px;
}

.type{
color:#9f9;
font-size:13px;
margin-bottom:5px;
}

input{
width:100%;
background:#1d1d1d;
border:1px solid #555;
color:white;
padding:4px;
margin-top:3px;
}

button{
background:#3b2a0f;
border:1px solid #caa64a;
color:#ffd36a;
padding:4px;
margin-top:4px;
cursor:pointer;
width:100%;
}

.partyButtons{
display:flex;
gap:5px;
margin-top:4px;
}

.partyButtons button{
flex:1;
}

.blockText{
color:red;
font-weight:bold;
text-align:center;
}

.adminPanel{
position:fixed;
right:20px;
bottom:20px;
background:#111;
border:2px solid #caa64a;
padding:10px;
display:none;
}

</style>

</head>

<body>

<div class="overlay">

<div class="header">

<img class="logo" src="https://prnt.sc/BRxl1uLayID1">

<div class="adminIcon" onclick="adminLogin()">⚙</div>

</div>

<div class="panel">

<div class="pricing">

<div class="price">💎 SOLO<br>5k SM</div>
<div class="price">💎 PARTY 2<br>2k SM</div>
<div class="price">💎 PARTY 3<br>1.5k SM</div>
<div class="price">🪙 Yang / SM</div>

</div>

<div class="calendar">

<button onclick="prevDay()">◀</button>

<span id="day"></span>

<button onclick="nextDay()">▶</button>

</div>

<div class="slots" id="slots"></div>

</div>

<div class="adminPanel" id="adminPanel">

<button onclick="blockHour()">Zablokuj godzinę</button>
<button onclick="blockDay()">Zablokuj dzień</button>

</div>

</div>

<script>

const socket=io()

let bookings={}
let day=new Date().toISOString().slice(0,10)
let admin=false

function adminLogin(){

let pass=prompt("Admin password")

if(pass==="platforma"){
admin=true
document.getElementById("adminPanel").style.display="block"
render()
}

}

function prevDay(){
let d=new Date(day)
d.setDate(d.getDate()-1)
day=d.toISOString().slice(0,10)
render()
}

function nextDay(){
let d=new Date(day)
d.setDate(d.getDate()+1)
day=d.toISOString().slice(0,10)
render()
}

function render(){

document.getElementById("day").innerText=day

let container=document.getElementById("slots")
container.innerHTML=""

let dayData=bookings[day]||{}

if(dayData.blockedDay){
container.innerHTML="<div class='blockText'>EXP WYŁĄCZONE TEGO DNIA</div>"
return
}

for(let h=0;h<24;h++){

let start=String(h).padStart(2,"0")+":00"
let end=String((h+1)%24).padStart(2,"0")+":00"

let label=start+" - "+end

let div=document.createElement("div")
div.className="slot"

let slot=dayData[start]

if(!slot){

div.classList.add("free")

div.innerHTML=`
<div class="time">${label}</div>

<input id="p_${start}" placeholder="Nick">
<input id="pin_${start}" placeholder="PIN">

<div class="partyButtons">
<button onclick="book('${start}',1)">Solo</button>
<button onclick="book('${start}',2)">Party 2</button>
<button onclick="book('${start}',3)">Party 3</button>
</div>
`

}else if(slot.blocked){

div.classList.add("blocked")
div.innerHTML=`<div class="time">${label}</div><div class="blockText">ZABLOKOWANE</div>`

}else{

div.classList.add("taken")

let playersHTML=""
slot.players.forEach(p=>{
playersHTML+=`<div>${p.player}</div>`
})

div.innerHTML=`
<div class="time">${label}</div>
<div class="type">Party ${slot.type}</div>
<div class="players">${playersHTML}</div>

<input id="p_${start}" placeholder="Nick">
<input id="pin_${start}" placeholder="PIN">

<button onclick="join('${start}')">Dołącz</button>

<input id="pin_cancel_${start}" placeholder="PIN do anulowania">
<button onclick="cancel('${start}')">Anuluj</button>
`

}

container.appendChild(div)

}

}

function book(time,type){

let player=document.getElementById("p_"+time).value
let pin=document.getElementById("pin_"+time).value

socket.emit("book",{day,time,player,pin,type})

}

function join(time){

let player=document.getElementById("p_"+time).value
let pin=document.getElementById("pin_"+time).value

socket.emit("book",{day,time,player,pin,type:3})

}

function cancel(time){

let pin=document.getElementById("pin_cancel_"+time).value

socket.emit("cancel",{day,time,pin})

}

function blockHour(){

let time=prompt("Godzina np 14:00")
socket.emit("block",{password:"platforma",day,time})

}

function blockDay(){

socket.emit("blockDay",{password:"platforma",day})

}

socket.on("update",(data)=>{

bookings=data
render()

})

render()

</script>

</body>
</html>
