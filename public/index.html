<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>V2 EXP PANEL</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
background:#0b0b0b;
font-family:Segoe UI;
color:white;
margin:0;
}

.header{
background:linear-gradient(#1a1a1a,#0d0d0d);
border-bottom:3px solid #caa64a;
text-align:center;
padding:20px;
font-size:26px;
color:#ffd36a;
letter-spacing:2px;
}

.panel{
max-width:1300px;
margin:auto;
padding:20px;
}

.pricing{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:25px;
}

.price{
background:#141414;
border:2px solid #6a5125;
border-radius:8px;
padding:15px;
width:200px;
text-align:center;
}

.price h3{
color:#ffd36a;
margin:0;
}

.calendar{
text-align:center;
margin-bottom:20px;
}

.calendar button{
background:#3b2a0f;
border:1px solid #caa64a;
color:#ffd36a;
padding:5px 12px;
cursor:pointer;
}

.slots{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.slot{
background:#151515;
border:2px solid #333;
border-radius:8px;
padding:10px;
}

.free{border-color:#2e9c45}
.taken{border-color:#c05}
.blocked{border-color:#777;background:#333}

.time{
color:#ffd36a;
font-weight:bold;
margin-bottom:6px;
}

.players{
font-size:14px;
margin-bottom:6px;
}

input,select{
width:100%;
background:#222;
border:1px solid #555;
color:white;
padding:4px;
margin-top:3px;
}

button{
background:#3b2a0f;
border:1px solid #caa64a;
color:#ffd36a;
padding:4px;
margin-top:4px;
cursor:pointer;
width:100%;
}

.admin{
text-align:center;
margin-bottom:10px;
}

.stats{
text-align:center;
color:#9f9;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">
V2 EXP BOOKING PANEL
</div>

<div class="panel">

<div class="pricing">

<div class="price">
<h3>SOLO</h3>
5k SM / godz
</div>

<div class="price">
<h3>PARTY 2</h3>
2k SM / osoba
</div>

<div class="price">
<h3>PARTY 3</h3>
1.5k SM / osoba
</div>

</div>

<div style="text-align:center;margin-bottom:20px;">
Możliwa płatność w Yang
</div>

<div class="calendar">

<button onclick="prevDay()">◀</button>

<span id="day"></span>

<button onclick="nextDay()">▶</button>

</div>

<div class="admin">

<input id="adminPass" placeholder="Admin password">
<button onclick="loginAdmin()">Admin</button>

</div>

<div id="stats" class="stats"></div>

<div class="slots" id="slots"></div>

</div>

<script>

const socket = io()

let bookings={}
let day=new Date().toISOString().slice(0,10)
let admin=false

function prevDay(){
let d=new Date(day)
d.setDate(d.getDate()-1)
day=d.toISOString().slice(0,10)
render()
}

function nextDay(){
let d=new Date(day)
d.setDate(d.getDate()+1)
day=d.toISOString().slice(0,10)
render()
}

function loginAdmin(){
if(document.getElementById("adminPass").value==="platforma"){
admin=true
render()
}
}

function render(){

document.getElementById("day").innerText=day

let container=document.getElementById("slots")
container.innerHTML=""

let dayData=bookings[day]||{}

let sm=0

for(let h=0;h<24;h++){

let start=String(h).padStart(2,"0")+":00"
let end=String((h+1)%24).padStart(2,"0")+":00"

let div=document.createElement("div")
div.className="slot"

let slot=dayData[start]

let timeLabel=start+" - "+end

if(!slot){

div.classList.add("free")

div.innerHTML=`
<div class="time">${timeLabel}</div>

<input id="p_${start}" placeholder="Nick">

<select id="type_${start}">
<option value="1">Solo</option>
<option value="2">Party 2</option>
<option value="3">Party 3</option>
</select>

<input id="pin_${start}" placeholder="PIN">

<button onclick="book('${start}')">Zarezerwuj</button>
`

}else if(slot.blocked){

div.classList.add("blocked")

div.innerHTML=`<div class="time">${timeLabel}</div>ZABLOKOWANE`

}else{

div.classList.add("taken")

let playersHTML=""

slot.players.forEach(p=>{
playersHTML+=`<div>${p.player}</div>`
})

let joinForm=""

if(slot.players.length<slot.type){

joinForm=`
<input id="p_${start}" placeholder="Nick">
<input id="pin_${start}" placeholder="PIN">
<button onclick="book('${start}')">Dołącz</button>
`
}

div.innerHTML=`
<div class="time">${timeLabel}</div>
<div class="players">${playersHTML}</div>
${joinForm}
<input id="pin_cancel_${start}" placeholder="PIN do anulowania">
<button onclick="cancel('${start}')">Anuluj</button>
`

if(slot.type==1) sm+=5000
if(slot.type==2) sm+=2000*slot.players.length
if(slot.type==3) sm+=1500*slot.players.length

}

container.appendChild(div)

}

if(admin){
document.getElementById("stats").innerText="Zarobione SM: "+sm
}

}

function book(time){

let player=document.getElementById("p_"+time).value
let pin=document.getElementById("pin_"+time).value

let typeEl=document.getElementById("type_"+time)
let type= typeEl ? parseInt(typeEl.value) : 3

socket.emit("book",{day,time,player,pin,type})

}

function cancel(time){

let pin=document.getElementById("pin_cancel_"+time).value

socket.emit("cancel",{day,time,pin})

}

socket.on("update",(data)=>{
bookings=data
render()
})

render()

</script>

</body>
</html>
