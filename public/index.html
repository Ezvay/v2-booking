<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>V2 EXP</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:url("https://en-wiki.metin2.gameforge.com/images/SpiderDungeon2.jpg") center/cover fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
}

.header{
display:flex;
justify-content:center;
align-items:center;
padding:15px;
border-bottom:3px solid #caa64a;
background:#0d0d0d;
position:relative;
}

.logo{
height:60px;
}

.adminIcon{
position:absolute;
right:20px;
top:18px;
font-size:24px;
cursor:pointer;
color:#ffd36a;
}

.panel{
max-width:1300px;
margin:auto;
padding:20px;
}

.pricing{
display:flex;
justify-content:center;
gap:25px;
margin-bottom:20px;
flex-wrap:wrap;
}

.price{
background:#141414;
border:2px solid #6a5125;
border-radius:10px;
padding:15px;
width:180px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.priceIcon{
font-size:28px;
margin-bottom:5px;
}

.calendar{
text-align:center;
margin-bottom:20px;
}

.calendar button{
background:#3b2a0f;
border:1px solid #caa64a;
color:#ffd36a;
padding:6px 12px;
cursor:pointer;
}

.slots{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.slot{
background:#151515;
border-radius:10px;
border:2px solid #333;
padding:10px;
box-shadow:0 0 12px rgba(0,0,0,0.6);
}

.free{border-color:#2e9c45}
.taken{border-color:#b53}
.blocked{border-color:#777;background:#333}

.time{
color:#ffd36a;
font-weight:bold;
margin-bottom:6px;
}

.players{
font-size:14px;
margin-bottom:5px;
}

input,select{
width:100%;
background:#1d1d1d;
border:1px solid #555;
color:white;
padding:4px;
margin-top:3px;
}

button{
background:#3b2a0f;
border:1px solid #caa64a;
color:#ffd36a;
padding:4px;
margin-top:4px;
cursor:pointer;
width:100%;
}

.blockText{
color:red;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="overlay">

<div class="header">

<img class="logo" src="https://i.postimg.cc/9FJpY0yL/logo.png">

<div class="adminIcon" onclick="adminLogin()">⚙</div>

</div>

<div class="panel">

<div class="pricing">

<div class="price">
<div class="priceIcon">💎</div>
Solo<br>5k SM
</div>

<div class="price">
<div class="priceIcon">💎</div>
Party 2<br>2k SM
</div>

<div class="price">
<div class="priceIcon">💎</div>
Party 3<br>1.5k SM
</div>

<div class="price">
<div class="priceIcon">🪙</div>
Yang / SM
</div>

</div>

<div class="calendar">

<button onclick="prevDay()">◀</button>

<span id="day"></span>

<button onclick="nextDay()">▶</button>

</div>

<div class="slots" id="slots"></div>

</div>

</div>

<script>

const socket=io()

let bookings={}
let day=new Date().toISOString().slice(0,10)
let admin=false

function adminLogin(){
let pass=prompt("Admin password")
if(pass==="platforma"){
admin=true
render()
}
}

function prevDay(){
let d=new Date(day)
d.setDate(d.getDate()-1)
day=d.toISOString().slice(0,10)
render()
}

function nextDay(){
let d=new Date(day)
d.setDate(d.getDate()+1)
day=d.toISOString().slice(0,10)
render()
}

function render(){

document.getElementById("day").innerText=day

let container=document.getElementById("slots")
container.innerHTML=""

let dayData=bookings[day]||{}

if(dayData.blockedDay){
container.innerHTML="<div class='blockText'>EXP WYŁĄCZONE TEGO DNIA</div>"
return
}

for(let h=0;h<24;h++){

let start=String(h).padStart(2,"0")+":00"
let end=String((h+1)%24).padStart(2,"0")+":00"

let label=start+" - "+end

let div=document.createElement("div")
div.className="slot"

let slot=dayData[start]

if(!slot){

div.classList.add("free")

div.innerHTML=`
<div class="time">${label}</div>

<input id="p_${start}" placeholder="Nick">

<select id="type_${start}">
<option value="1">Solo</option>
<option value="2">Party 2</option>
<option value="3">Party 3</option>
</select>

<input id="pin_${start}" placeholder="PIN">

<button onclick="book('${start}')">Zarezerwuj</button>
`

}else if(slot.blocked){

div.classList.add("blocked")

div.innerHTML=`<div class="time">${label}</div><div class="blockText">ZABLOKOWANE</div>`

}else{

div.classList.add("taken")

let playersHTML=""

slot.players.forEach(p=>{
playersHTML+=`<div>${p.player}</div>`
})

let join=""

if(slot.players.length<slot.type){

join=`
<input id="p_${start}" placeholder="Nick">
<input id="pin_${start}" placeholder="PIN">
<button onclick="book('${start}')">Dołącz</button>
`

}

div.innerHTML=`
<div class="time">${label}</div>
<div class="players">${playersHTML}</div>
${join}
<input id="pin_cancel_${start}" placeholder="PIN do anulowania">
<button onclick="cancel('${start}')">Anuluj</button>
`

}

container.appendChild(div)

}

}

function book(time){

let player=document.getElementById("p_"+time).value
let pin=document.getElementById("pin_"+time).value

let typeEl=document.getElementById("type_"+time)
let type= typeEl ? parseInt(typeEl.value) : 3

socket.emit("book",{day,time,player,pin,type})

}

function cancel(time){

let pin=document.getElementById("pin_cancel_"+time).value

socket.emit("cancel",{day,time,pin})

}

socket.on("update",(data)=>{

bookings=data
render()

})

render()

</script>

</body>
</html>
