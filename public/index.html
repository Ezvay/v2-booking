<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<title>V2 EXP BOOST</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0b0f;
color:white;
overflow-x:hidden;
}

/* PARALLAX BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://en-wiki.metin2.gameforge.com/images/SpiderDungeon2.jpg") center/cover;
z-index:-2;
}

/* FOG */

.fog{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://i.imgur.com/8QfQK2G.png");
opacity:0.15;
animation:fogMove 60s linear infinite;
z-index:-1;
}

@keyframes fogMove{
from{transform:translateX(0)}
to{transform:translateX(-1000px)}
}

/* HERO */

.hero{
height:500px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

#logo{
width:720px;
max-width:90%;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 10px gold)}
to{filter:drop-shadow(0 0 40px gold)}
}

/* BUTTON */

.runeButton{
margin-top:20px;
padding:15px 30px;
background:linear-gradient(#6b4d1f,#3b2a0f);
border:2px solid #caa64a;
color:#ffd36a;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.runeButton:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,215,100,0.5);
}

/* PRICING */

.pricing{
display:flex;
justify-content:center;
gap:40px;
padding:40px;
flex-wrap:wrap;
}

.priceCard{
background:#141418;
border:2px solid #caa64a;
padding:30px;
width:240px;
text-align:center;
transition:0.3s;
}

.priceCard:hover{
transform:scale(1.08);
box-shadow:0 0 30px rgba(255,215,100,0.5);
}

/* CALENDAR */

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
max-width:900px;
margin:40px auto;
gap:10px;
}

.day{
background:#141418;
border:1px solid #444;
padding:14px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.day:hover{
background:#1d1d22;
}

.day.active{
border:2px solid gold;
}

/* SLOTS */

#slots{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.slot{
background:#141418;
border:2px solid #333;
border-radius:14px;
padding:16px;
transition:0.25s;
}

.slot:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(255,215,100,0.4);
}

.free{border-color:#2e9c45}
.taken{border-color:#b23}

/* CHAT */

#chat{
position:fixed;
left:20px;
bottom:20px;
width:260px;
background:#111;
border:2px solid gold;
padding:10px;
}

#chatMessages{
height:160px;
overflow:auto;
}

/* RANKING */

#ranking{
position:fixed;
right:20px;
top:200px;
background:#111;
border:2px solid gold;
padding:10px;
width:200px;
}

/* ADMIN */

#admin{
position:fixed;
right:20px;
bottom:20px;
background:#111;
border:2px solid gold;
padding:15px;
display:none;
width:320px;
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
border:2px solid gold;
padding:10px;
display:none;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="fog"></div>

<div class="hero">

<img id="logo" src="https://zapodaj.net/images/01e4e4691fd7a.png">

<button class="runeButton" onclick="scrollSlots()">Zarezerwuj EXP</button>

</div>

<div class="pricing">

<div class="priceCard">SOLO<br>5000 SM</div>
<div class="priceCard">PARTY 2<br>2000 SM</div>
<div class="priceCard">PARTY 3<br>1500 SM</div>

</div>

<div id="calendar" class="calendar"></div>

<div id="slots"></div>

<div id="chat">

<div id="chatMessages"></div>

<input id="chatInput" placeholder="Napisz...">

<button onclick="sendChat()">Wyślij</button>

</div>

<div id="ranking">

<b>Ranking</b>

<div id="rankingList"></div>

</div>

<div id="admin">

<h3>Panel Admina</h3>

<div>SM zarobione: <span id="statSM"></span></div>

<canvas id="chart"></canvas>

</div>

<div id="toast" class="toast"></div>

<script>

const socket=io()

let bookings={}
let ranking={}
let chat=[]
let stats={}
let selectedDay=null

function toast(msg){

let t=document.getElementById("toast")

t.innerText=msg
t.style.display="block"

setTimeout(()=>t.style.display="none",2000)

}

function scrollSlots(){
document.getElementById("slots").scrollIntoView({behavior:"smooth"})
}

/* SOCKET */

socket.on("init",(data)=>{

bookings=data.bookings
ranking=data.ranking
chat=data.chat
stats=data.stats||{}

renderRanking()
renderChat()

})

socket.on("update",(data)=>{

bookings=data.bookings
ranking=data.ranking
stats=data.stats||{}

renderSlots()
renderRanking()

})

socket.on("chat",(data)=>{

chat=data
renderChat()

})

/* CHAT */

function renderChat(){

let box=document.getElementById("chatMessages")

box.innerHTML=""

chat.forEach(m=>box.innerHTML+="<div>"+m+"</div>")

}

function sendChat(){

let msg=document.getElementById("chatInput").value

socket.emit("chat",msg)

document.getElementById("chatInput").value=""

}

/* RANKING */

function renderRanking(){

let box=document.getElementById("rankingList")

box.innerHTML=""

Object.entries(ranking)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)
.forEach(r=>box.innerHTML+="<div>"+r[0]+" ("+r[1]+")</div>")

}

/* ADMIN LOGIN */

document.addEventListener("keydown",e=>{

if(e.key==="F2"){

let pass=prompt("Admin password")

if(pass==="platforma"){

document.getElementById("admin").style.display="block"

}

}

})

/* CALENDAR */

function buildCalendar(){

let cal=document.getElementById("calendar")

let date=new Date()

let year=date.getFullYear()

let month=date.getMonth()

let days=new Date(year,month+1,0).getDate()

for(let i=1;i<=days;i++){

let d=document.createElement("div")

d.className="day"

d.innerText=i

let iso=year+"-"+String(month+1).padStart(2,"0")+"-"+String(i).padStart(2,"0")

d.onclick=()=>{

selectedDay=iso

document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"))

d.classList.add("active")

renderSlots()

}

cal.appendChild(d)

}

}

/* SLOTS */

function renderSlots(){

if(!selectedDay) return

let container=document.getElementById("slots")

container.innerHTML=""

let dayData=bookings[selectedDay]||{}

for(let h=0;h<24;h++){

let start=String(h).padStart(2,"0")+":00"

let div=document.createElement("div")

div.className="slot"

let slot=dayData[start]

if(!slot){

div.classList.add("free")

div.innerHTML=`
<b>${start}</b>

<input id="p_${start}" placeholder="Nick">

<input id="pin_${start}" placeholder="PIN">

<button onclick="book('${start}',1)">Solo</button>

<button onclick="book('${start}',2)">Party2</button>

<button onclick="book('${start}',3)">Party3</button>
`

}else{

div.classList.add("taken")

let players=""

slot.players.forEach(p=>players+="<div>"+p.player+"</div>")

div.innerHTML=`
<b>${start}</b>

${players}

<input id="pin_cancel_${start}" placeholder="PIN">

<button onclick="cancel('${start}')">Anuluj</button>
`

}

container.appendChild(div)

}

}

function book(time,type){

let player=document.getElementById("p_"+time).value
let pin=document.getElementById("pin_"+time).value

socket.emit("book",{day:selectedDay,time,player,pin,type})

toast("Rezerwacja zapisana")

}

function cancel(time){

let pin=document.getElementById("pin_cancel_"+time).value

socket.emit("cancel",{day:selectedDay,time,pin})

toast("Rezerwacja anulowana")

}

buildCalendar()

</script>

</body>
</html>
