<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>V2 EXP Booking</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
background:#0c0c0c;
color:#eee;
font-family:Segoe UI,Arial;
margin:0;
}

.header{
background:#111;
border-bottom:2px solid #6a5125;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#ffd36a;
}

.panel{
max-width:1200px;
margin:auto;
padding:20px;
}

.pricing{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.priceCard{
background:#151515;
border:2px solid #6a5125;
border-radius:10px;
padding:15px;
width:180px;
text-align:center;
}

.priceTitle{
color:#ffd36a;
font-weight:bold;
margin-bottom:5px;
}

.calendar{
text-align:center;
margin-bottom:20px;
}

.calendar button{
background:#3b2a0f;
border:1px solid #caa64a;
color:#ffd36a;
padding:4px 10px;
cursor:pointer;
}

.slots{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.slot{
background:#151515;
border-radius:8px;
border:2px solid #333;
padding:10px;
}

.free{border-color:#2d8f3c}
.taken{border-color:#b53}
.blocked{border-color:#666;background:#333}

.time{
color:#ffd36a;
font-weight:bold;
margin-bottom:5px;
}

.players{
font-size:13px;
margin-bottom:5px;
}

input,select{
width:95%;
margin-top:3px;
background:#222;
border:1px solid #555;
color:white;
padding:3px;
}

button{
background:#3b2a0f;
border:1px solid #caa64a;
color:#ffd36a;
padding:4px 8px;
margin-top:4px;
cursor:pointer;
width:100%;
}

.adminPanel{
text-align:center;
margin-bottom:10px;
}

.stats{
text-align:center;
margin-bottom:10px;
color:#9f9;
}

</style>

</head>

<body>

<div class="header">
V2 EXP BOOKING
</div>

<div class="panel">

<div class="pricing">

<div class="priceCard">
<div class="priceTitle">Solo</div>
5k SM / godzina
</div>

<div class="priceCard">
<div class="priceTitle">Party 2</div>
2k SM / osoba
</div>

<div class="priceCard">
<div class="priceTitle">Party 3</div>
1.5k SM / osoba
</div>

</div>

<div style="text-align:center;margin-bottom:10px;">
Możliwa płatność w Yang
</div>

<div class="calendar">

<button onclick="prevDay()">◀</button>

<span id="day"></span>

<button onclick="nextDay()">▶</button>

</div>

<div class="adminPanel">

<input id="adminPass" placeholder="Admin password">

<button onclick="loginAdmin()" style="width:120px;">Admin</button>

</div>

<div id="stats" class="stats"></div>

<div class="slots" id="slots"></div>

</div>

<script>

const socket = io()

let bookings={}
let day=new Date().toISOString().slice(0,10)
let admin=false

function prevDay(){
let d=new Date(day)
d.setDate(d.getDate()-1)
day=d.toISOString().slice(0,10)
render()
}

function nextDay(){
let d=new Date(day)
d.setDate(d.getDate()+1)
day=d.toISOString().slice(0,10)
render()
}

function loginAdmin(){
if(document.getElementById("adminPass").value==="platforma"){
admin=true
render()
}
}

function render(){

document.getElementById("day").innerText=day

let container=document.getElementById("slots")
container.innerHTML=""

let dayData=bookings[day]||{}

let sm=0

for(let h=0;h<24;h++){

let start=String(h).padStart(2,"0")+":00"
let end=String((h+1)%24).padStart(2,"0")+":00"
let label=start+" - "+end

let div=document.createElement("div")
div.className="slot"

let slot=dayData[start]

if(!slot){

div.classList.add("free")

div.innerHTML=`
<div class="time">${label}</div>
<div>Wolny slot</div>

<input id="p_${start}" placeholder="Nick">

<select id="type_${start}">
<option value="1">Solo</option>
<option value="2">Party 2</option>
<option value="3">Party 3</option>
</select>

<input id="pin_${start}" placeholder="PIN">

<button onclick="book('${start}')">Rezerwuj</button>
`

}else if(slot.blocked){

div.classList.add("blocked")

div.innerHTML=`
<div class="time">${label}</div>
ZABLOKOWANE
`

if(admin){
div.innerHTML+=`<button onclick="adminDelete('${start}')">Odblokuj</button>`
}

}else{

div.classList.add("taken")

let playersHTML=""

slot.players.forEach(p=>{
playersHTML+=`<div>${p.player}</div>`
})

div.innerHTML=`
<div class="time">${label}</div>
<div class="players">${playersHTML}</div>

<input id="pin_${start}" placeholder="PIN">

<button onclick="join('${start}')">Dołącz</button>
<button onclick="cancel('${start}')">Anuluj</button>
`

if(admin){
div.innerHTML+=`
<button onclick="block('${start}')">Zablokuj</button>
<button onclick="adminDelete('${start}')">Usuń</button>
`
}

if(slot.type==1) sm+=5000
if(slot.type==2) sm+=2000*slot.players.length
if(slot.type==3) sm+=1500*slot.players.length

}

container.appendChild(div)

}

if(admin){
document.getElementById("stats").innerText="Zarobione SM: "+sm
}

}

function book(time){

let player=document.getElementById("p_"+time).value
let pin=document.getElementById("pin_"+time).value
let type=parseInt(document.getElementById("type_"+time).value)

socket.emit("book",{day,time,player,pin,type})

}

function join(time){

let player=prompt("Nick")
let pin=prompt("PIN")

socket.emit("book",{day,time,player,pin,type:3})

}

function cancel(time){

let pin=document.getElementById("pin_"+time).value

socket.emit("cancel",{day,time,pin})

}

function block(time){

socket.emit("block",{password:"platforma",day,time})

}

function adminDelete(time){

socket.emit("adminDelete",{password:"platforma",day,time})

}

socket.on("update",(data)=>{
bookings=data
render()
})

render()

</script>

</body>
</html>
